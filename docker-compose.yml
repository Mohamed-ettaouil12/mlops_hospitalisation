services:

  # =========================
  # MLFLOW TRACKING SERVER
  # Must start first (dependency for API and Airflow)
  # =========================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    container_name: mlops_mlflow
    user: "0"
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow:/mlflow
    entrypoint: ["mlflow", "server"]
    command:
      - "--backend-store-uri=sqlite:////mlflow/mlflow.db"
      - "--default-artifact-root=/mlflow/artifacts"
      - "--serve-artifacts"
      - "--host=0.0.0.0"
      - "--port=5000"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s=socket.socket(); s.settimeout(3); s.connect((\"localhost\", 5000)); s.close()'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # =========================
  # FASTAPI - MODEL SERVING
  # Depends on MLflow being healthy
  # =========================
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: mlops_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./reports:/app/reports
      - ./outputs:/app/outputs
      - ./config:/app/config
      - ./api:/app/api
      - ./mlflow:/mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import http.client; c=http.client.HTTPConnection(\"localhost:8000\"); c.request(\"GET\", \"/health\"); r=c.getresponse(); exit(0 if r.status==200 else 1)'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  # =========================
  # AIRFLOW - DAG SCHEDULER
  # Depends on MLflow being healthy
  # =========================
  airflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: mlops_airflow
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
      - ./monitoring:/opt/airflow/monitoring
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - ./reports:/opt/airflow/reports
      - ./outputs:/opt/airflow/outputs
      - ./mlflow:/mlflow
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__WEBSERVER__SECRET_KEY: mlops_secret_key_2024
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_CREATE: "true"
      AIRFLOW__WEBSERVER__CSRF_ENABLED: "False"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth"
      PYTHONPATH: /opt/airflow
      MLFLOW_TRACKING_URI: http://mlflow:5000
    entrypoint: ["/entrypoint.sh"]
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy

  # =========================
  # PROMETHEUS
  # =========================
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: mlops_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus
      - --web.console.templates=/etc/prometheus
      - --web.enable-lifecycle
    networks:
      - app-network
    restart: unless-stopped

  # =========================
  # GRAFANA
  # =========================
  grafana:
    image: grafana/grafana:11.2.0
    container_name: mlops_grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/api_dashboard.json
    networks:
      - app-network
    restart: unless-stopped

  # =========================
  # MODEL INIT (one-shot)
  # Seeds MLflow with initial model on first run
  # =========================
  init:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: mlops_init
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./config:/app/config
      - ./mlflow:/mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
      PYTHONPATH: /app
    networks:
      - app-network
    depends_on:
      mlflow:
        condition: service_healthy
    entrypoint: ["python3", "scripts/init_mlflow.py"]
    profiles:
      - init


# =========================
# NETWORK
# =========================
networks:
  app-network:
    driver: bridge
