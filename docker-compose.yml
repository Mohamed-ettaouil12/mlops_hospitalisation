version: '3.8'

services:

  # Service 1 — API FastAPI
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    restart: always

  # Service 2 — MLflow
  mlflow:
    image: python:3.10-slim
    command: bash -c "pip install mlflow && mlflow ui --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    restart: always