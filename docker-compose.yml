services:

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    networks:
      - app-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    environment:
      - MLFLOW_ALLOW_FILE_STORE=true
    command: mlflow ui --backend-store-uri /mlruns --host 0.0.0.0 --port 5000
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
